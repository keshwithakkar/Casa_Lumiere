{% extends 'custom_admin/base.html' %}
{% block content %}

<div class="page-header">
    <h1 style="font-weight:800;">Contact Us</h1>
    <a href="{% url 'admin_edit_contactus' %}" class="btn-add">Edit</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>Description</th>
        </tr>
    </thead>

    <tbody>
        {% if contact %}
        <tr>
            <td>{{ contact.description|truncatechars:120 }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2" style="text-align:center;">No contact content added</td>
        </tr>
        {% endif %}
    </tbody>
</table>

{% endblock %}
