{% extends 'custom_admin/base.html' %}

{% block content %}

<div class="page-header">
    <h1 style="font-weight:800;">Registered Guests</h1>
    <a href="{% url 'admin_add_registered_user' %}" class="btn-add">+ Add Guest</a>
</div>

<table class="admin-table">

    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Password</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

        {% for user in users %}
        <tr>

            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>XXXX</td>

            <td>
                <div class="action-buttons">

                    <a href="{% url 'admin_edit_registered_user' user.id %}" class="btn-edit">
                        Edit
                    </a>

                    <form action="{% url 'admin_delete_registered_user' user.id %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-delete">
                            Delete
                        </button>
                    </form>

                </div>
            </td>

        </tr>
        {% empty %}

        <tr>
            <td colspan="5" style="text-align:center;">
                No registered users found
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
