{% extends 'custom_admin/base.html' %}

{% block content %}
<div class="page-header">
    <h1 style="font-weight:800;">Guests</h1>
    <a href="{% url 'admin_add_guest' %}" class="btn-add">+ Add Guest</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for g in guests %}
        <tr>
            <td>{{ g.id }}</td>
            <td>{{ g.name }}</td>
            <td>{{ g.email }}</td>
            <td>{{ g.phone }}</td>
            <td>
                <div class="action-buttons">
                    <a href="{% url 'admin_edit_guest' g.id %}" class="btn-edit">Edit</a>
                    <form action="{% url 'admin_delete_guest' g.id %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" style="text-align:center;">No guests found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
