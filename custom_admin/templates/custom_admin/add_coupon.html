{% extends 'custom_admin/base.html' %}

{% block content %}

<h1 style="color:#854f6c;">Add Coupon</h1>

<form method="POST" class="admin-form">
    {% csrf_token %}

    <label>Code</label>
    <input type="text" name="code" required>

    <label>Percentage</label>
    <input type="number" name="percentage" step="0.01" required>

    <button type="submit" class="btn-add">Save Coupon</button>
    <a href="{% url 'admin_coupon' %}" class="btn-cancel">Cancel</a>
</form>

{% endblock %}
