{% extends 'custom_admin/base.html' %}

{% block content %}

<div class="page-header">
    <h1 style="font-weight: 800;">Restaurant</h1>
    <a href="{% url 'admin_add_restaurant' %}" class="btn-add">+ Add Restaurant</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for r in restaurants %}
        <tr>
            <td>{{ r.restaurant_id }}</td>
            <td>{{ r.name }}</td>
            <td>{{ r.description }}</td>
            <td><img src="{{ r.image.url }}" class="table-img"></td>
            <td>
                <div class="action-buttons">
                    <a href="{% url 'admin_edit_restaurant' r.restaurant_id %}" class="btn-edit">
                        Edit
                    </a>

                    <form action="{% url 'admin_delete_restaurant' r.restaurant_id %}" 
                        method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-delete">
                            Delete
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" style="text-align: center;">No restaurant data found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
