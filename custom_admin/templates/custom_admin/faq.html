{% extends 'custom_admin/base.html' %}
{% block content %}

<div class="page-header">
    <h1 style="font-weight:800;">FAQs</h1>
    <a href="{% url 'admin_add_faq' %}" class="btn-add">+ Add FAQ</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Question</th>
            <th>Answer</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for f in faqs %}
        <tr>
            <td>{{ f.faq_id }}</td>
            <td>{{ f.question }}</td>
            <td>{{ f.answer|truncatechars:60 }}</td>
            <td style="width: 140px;">
                <a href="{% url 'admin_edit_faq' f.faq_id %}">
                    <button class="btn-edit">Edit</button>
                </a>

                <a href="{% url 'admin_delete_faq' f.faq_id %}">
                    <button class="btn-delete">Delete</button>
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="text-align:center;">No FAQs found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
