{% extends 'custom_admin/base.html' %}
{% load static %}

{% block content %}

<div class="page-header">
    <h1 style="font-weight: 800;">Testimonials</h1>
    <a href="{% url 'admin_add_testimonial' %}" class="btn-add">+ Add Testimonial</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Message</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for t in testimonials %}
        <tr>
            <td>{{ t.id }}</td>
            <td>{{ t.name }}</td>
            <td>{{ t.message }}</td>
            <td><img src="{{ t.image.url }}" class="table-img"></td>
            <td>
                <div class="action-buttons">

                    <a href="{% url 'admin_edit_testimonial' t.id %}" class="btn-edit">
                        Edit
                    </a>

                    <form action="{% url 'admin_delete_testimonial' t.id %}"
                        method="post"
                        style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-delete">
                            Delete
                        </button>
                    </form>

                </div>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" style="text-align: center;">No testimonials found</td>
        </tr>
        {% endfor %}
    </tbody>

</table>


{% endblock %}
