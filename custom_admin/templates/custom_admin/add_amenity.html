{% extends 'custom_admin/base.html' %}

{% block content %}

<h1 style="color:#854f6c;">Add Amenity</h1>

<form method="POST" enctype="multipart/form-data" class="admin-form">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Category</label>
    <div style="display:flex; align-items:center; gap:30px; margin-top:8px;">
        <label style="display:flex; align-items:center; gap:6px;">
            <input type="radio" name="category" value="Indoor" required>
            Indoor
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
            <input type="radio" name="category" value="Outdoor">
            Outdoor
        </label>
    </div>

    <label>Image</label>
    <input type="file" name="image" required>

    <button type="submit" class="btn-add">Save Amenity</button>
    <a href="{% url 'admin_amenities' %}" class="btn-cancel">Cancel</a>
</form>

{% endblock %}
