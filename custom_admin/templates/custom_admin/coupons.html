{% extends 'custom_admin/base.html' %}

{% block content %}

<div class="page-header">
    <h1 style="font-weight:800;">Coupons</h1>
    <a href="{% url 'admin_add_coupon' %}" class="btn-add">+ Add Coupon</a>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Percentage</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in coupons %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.code }}</td>
            <td>{{ c.percentage }}%</td>
            <td>
                <a href="{% url 'admin_edit_coupon' c.id %}" class="btn-edit">Edit</a>
                <form action="{% url 'admin_delete_coupon' c.id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-delete">Delete</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="text-align:center;">No coupons found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
