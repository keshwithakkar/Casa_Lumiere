{% extends 'custom_admin/base.html' %}
{% block content %}

<h1 style="color:#854f6c;">Add Guest</h1>

<form method="POST" class="admin-form">
    {% csrf_token %}
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone</label>
    <input type="tel" name="phone" required>

    <button type="submit" class="btn-add">Save Guest</button>
    <a href="{% url 'admin_guests' %}" class="btn-cancel">Cancel</a>
</form>

{% endblock %}
